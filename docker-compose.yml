# AsideMe — production stack for a single GCE VM (free-tier e2-micro).
#   app   — the Node server (SQLite on the mounted ./data dir, not exposed publicly)
#   caddy — reverse proxy + automatic HTTPS (Let's Encrypt) for asideme.app
#
# Secrets live in ./.env on the VM (never committed). Non-secret config is set
# inline below. See DEPLOY_GCP.md for the full runbook.

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      # LLM model. flash-lite is ~3x faster than flash for short class Q&A
      # (answers ~0.5s vs ~1.4s). Thinking is also disabled in code. Bump to
      # gemini-2.5-flash if you want richer answers at the cost of latency.
      - GEMINI_MODEL=gemini-2.5-flash-lite
      - DATABASE_PATH=/data/devlisten.db
      - APP_URL=https://asideme.app
      - CORS_ORIGIN=https://asideme.app
      # Speech-to-text provider. Google Cloud Speech-to-Text v2 — keyless auth
      # via the GCE metadata server, free-tier friendly, cross-browser. Whisper
      # (OpenAI) is also wired up and ready; switch TRANSCRIPTION_PROVIDER=whisper
      # once the OpenAI account has billing credits (the key currently returns
      # insufficient_quota). Client degrades to browser SpeechRecognition on error.
      - TRANSCRIPTION_PROVIDER=google
      # Email verification temporarily disabled: Resend (RESEND_API_KEY) is not
      # configured yet, so magic links can't be delivered. With this false, the
      # signup form surfaces the verify link on-page so login works without email.
      # Re-enable (set true) once the asideme.app domain is verified in Resend.
      - REQUIRE_EMAIL_VERIFICATION=false
      # Caddy is the single proxy hop in front of the app.
      - TRUST_PROXY_HOPS=1
    volumes:
      # SQLite persists on the VM boot disk. The container entrypoint chowns
      # this to the non-root app user on start.
      - ./data:/data
    expose:
      - "3001"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
